// ─── FOUNDATION MATCHING ALGORITHM ──────────────────────────────────────────
// Weighted scoring: 70% shade match + 30% skin type compatibility
function scoreFoundation(foundation, skinHex, skinTypes, skinMetrics) {
  // 1. Shade score (0-100, inverted from distance)
  var dist = colourDist(skinHex, foundation.hex);
  var maxDist = 200; // practical max RGB distance
  var shadeScore = Math.max(0, 100 - (dist / maxDist) * 100);

  // 2. Skin type compatibility score (0-100)
  var typeScore = 0;
  var matchCount = 0;

  // Check if foundation's skinTypes match detected skin types
  for (var i = 0; i < skinTypes.length; i++) {
    var st = skinTypes[i].toLowerCase().replace("-", "");
    for (var j = 0; j < foundation.skinTypes.length; j++) {
      if (foundation.skinTypes[j].toLowerCase() === st ||
          (st === "combinationoily" && (foundation.skinTypes[j] === "oily" || foundation.skinTypes[j] === "combination")) ||
          (st === "mature" && foundation.skinTypes[j] === "dry")) {
        matchCount++;
        break;
      }
    }
  }
  if (skinTypes.length > 0) {
    typeScore += (matchCount / skinTypes.length) * 50;
  }

  // Finish type appropriateness based on skin metrics
  if (skinMetrics.oiliness > 55 && foundation.finishType === "mattifying") typeScore += 25;
  else if (skinMetrics.oiliness > 55 && foundation.finishType === "hydrating") typeScore -= 15;
  else if (skinMetrics.hydration < 45 && foundation.finishType === "hydrating") typeScore += 25;
  else if (skinMetrics.hydration < 45 && foundation.finishType === "mattifying") typeScore -= 15;
  else if (foundation.finishType === "balanced") typeScore += 10;
  else typeScore += 5;

  // Sensitive skin penalty for full coverage (tends to be heavier formulas)
  if (skinMetrics.sensitivity > 55 && foundation.coverage === "Full") typeScore -= 10;
  if (skinMetrics.sensitivity > 55 && foundation.coverage === "Light") typeScore += 10;

  typeScore = Math.max(0, Math.min(100, typeScore));

  // 3. Combined weighted score
  var combined = (shadeScore * 0.7) + (typeScore * 0.3);

  return {
    total: combined,
    shadeScore: Math.round(shadeScore),
    typeScore: Math.round(typeScore),
    shadeMatch: shadeScore > 80 ? "Excellent" : shadeScore > 60 ? "Good" : shadeScore > 40 ? "Fair" : "Approximate"
  };
}

function hexToRgb(hex) {
  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})/i.exec(hex);
  if (!result) return [0, 0, 0];
  return [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)];
}

function colourDist(h1, h2) {
  var c1 = hexToRgb(h1), c2 = hexToRgb(h2);
  return Math.sqrt(Math.pow(c1[0]-c2[0], 2) + Math.pow(c1[1]-c2[1], 2) + Math.pow(c1[2]-c2[2], 2));
}

function skinHexAt(t) {
  var n = SKIN_GRAD.length - 1;
  var i = Math.min(n - 1, Math.floor(t * n));
  var f = t * n - i;
  var c1 = hexToRgb(SKIN_GRAD[i]), c2 = hexToRgb(SKIN_GRAD[i + 1]);
  var r = Math.round(c1[0] + (c2[0] - c1[0]) * f);
  var g = Math.round(c1[1] + (c2[1] - c1[1]) * f);
  var b = Math.round(c1[2] + (c2[2] - c1[2]) * f);
  return "#" + r.toString(16).padStart(2, "0") + g.toString(16).padStart(2, "0") + b.toString(16).padStart(2, "0");
}

var depthLabel = function(t) { return t < 0.18 ? "Fair" : t < 0.35 ? "Light" : t < 0.52 ? "Medium" : t < 0.68 ? "Medium-Deep" : t < 0.83 ? "Deep" : "Rich Deep"; };

// ─── SKIN TYPE CLASSIFICATION ────────────────────────────────────────────────
function getSkinType(concerns, metrics) {
  var types = [];
  var hasDry = concerns.indexOf("dry") >= 0;
  var hasDehydrated = concerns.indexOf("dehydrated") >= 0;
  var hasOily = concerns.indexOf("oily") >= 0;
  var hasSensitive = concerns.indexOf("sensitive") >= 0;

  // User-selected concerns take priority for primary type
  if (hasDry && hasOily) types.push("Combination-Dry");
  else if (hasDry || hasDehydrated) types.push("Dry");
  else if (hasOily && metrics.hydration < 50) types.push("Combination-Oily");
  else if (hasOily) types.push("Oily");
  // Fallback to metric-based classification only if user didn't specify
  else if (metrics.oiliness > 60 && metrics.hydration < 50) types.push("Combination-Oily");
  else if (metrics.oiliness > 65) types.push("Oily");
  else if (metrics.hydration < 40) types.push("Dry");
  else if (metrics.hydration > 65 && metrics.oiliness < 40) types.push("Normal");
  else types.push("Combination");

  if (hasDehydrated && types[0] !== "Dry") types.push("Dehydrated");
  if (hasSensitive || metrics.sensitivity > 55) types.push("Sensitive");
  if (concerns.indexOf("aging") >= 0 && metrics.firmness < 50) types.push("Mature");
  return types;
}

  var size = 21;

  var scanStageState = useState(0);
  var scanStage = scanStageState[0], setScanStage = scanStageState[1];

  var filterState = useState({halal:false,vegan:false,crueltyFree:false});
  var filters = filterState[0], setFilters = filterState[1];

  var tabState = useState("overview");
  var activeTab = tabState[0], setActiveTab = tabState[1];

  var routineSectionState = useState("morning");
  var routineSection = routineSectionState[0], setRoutineSection = routineSectionState[1];

  var emailState = useState("");
  var email = emailState[0], setEmail = emailState[1];

  var emailSentState = useState(false);
  var emailSent = emailSentState[0], setEmailSent = emailSentState[1];

  var sliderRef = useRef(null);

  var skinHex = skinHexAt(skinPos);
  var activeConcerns = Object.entries(skinConcerns).filter(function(e) { return e[1]; }).map(function(e) { return e[0]; });

  var skinMetrics = {
    hydration: Math.round(Math.max(5, Math.min(95, 70 - skinPos * 30 + (skinConcerns.dry ? -25 : 0) + (skinConcerns.dehydrated ? -20 : 0)))),
    oiliness: Math.round(Math.max(5, Math.min(95, 20 + skinPos * 15 + (skinConcerns.oily ? 45 : skinConcerns.dry ? -10 : 0)))),
    sensitivity: Math.round(Math.max(5, Math.min(95, 25 + (skinConcerns.sensitive ? 55 : 0)))),
    pigmentation: Math.round(Math.max(5, Math.min(95, 20 + skinPos * 30 + (skinConcerns.pigmentation ? 40 : 0)))),
    pores: Math.round(Math.max(5, Math.min(95, 20 + (skinConcerns.pores ? 50 : skinConcerns.oily ? 30 : 0)))),
    firmness: Math.round(Math.max(5, Math.min(95, 80 - skinPos * 20 - (skinConcerns.aging ? 30 : 0)))),
  };

  var skinTypes = getSkinType(activeConcerns, skinMetrics);
  var routine = buildRoutine(activeConcerns.length ? activeConcerns : ["all"]);

  var foundationMatches = FOUNDATIONS.slice()
    .map(function(p) {
      var scores = scoreFoundation(p, skinHex, skinTypes, skinMetrics);
      return Object.assign({}, p, {dist: colourDist(skinHex, p.hex), scores: scores});
    })
    .sort(function(a, b) { return b.scores.total - a.scores.total; })
    .filter(function(p) { return (!filters.halal || p.halal) && (!filters.vegan || p.vegan) && (!filters.crueltyFree || p.crueltyFree); })
    .slice(0, 10);

  var updatePos = function(cx) {
    var r = sliderRef.current ? sliderRef.current.getBoundingClientRect() : null;
    if (r) setSkinPos(Math.max(0, Math.min(1, (cx - r.left) / r.width)));
  };

  // Mouse events for slider
  useEffect(function() {
    var mv = function(e) { if (dragging) updatePos(e.clientX); };
    var up = function() { setDragging(false); };
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
    return function() {
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
    };
  }, [dragging]);

  // Touch events for slider
  useEffect(function() {
    var el = sliderRef.current;
    if (!el) return;
    var onTouchMove = function(e) {
      if (dragging && e.touches.length > 0) {
        e.preventDefault();
        updatePos(e.touches[0].clientX);
      }
    };
    var onTouchEnd = function() { setDragging(false); };
    el.addEventListener("touchmove", onTouchMove, {passive: false});
    window.addEventListener("touchend", onTouchEnd);
    return function() {
      el.removeEventListener("touchmove", onTouchMove);
      window.removeEventListener("touchend", onTouchEnd);
    };
  }, [dragging]);

  var runScan = function() {
    setPhase("scan");
    setScanProgress(0);
    setScanStage(0);
    [0, 18, 36, 55, 75, 100].forEach(function(v, i) {
      setTimeout(function() { setScanProgress(v); setScanStage(i); }, i * 550);
    });
    setTimeout(function() { setPhase("results"); setActiveTab(goal === "foundation" ? "foundation" : "overview"); }, 3600);
  };

  var toggleFilter = function(k) { setFilters(function(p) { var n = Object.assign({}, p); n[k] = !n[k]; return n; }); };
  var toggleConcern = function(k) { setSkinConcerns(function(p) { var n = Object.assign({}, p); n[k] = !n[k]; return n; }); };

  var handleSliderStart = function(e) {
    setDragging(true);
    if (e.touches) {
      updatePos(e.touches[0].clientX);
    } else {
      updatePos(e.clientX);

  // ── WELCOME ───────────────────────────────────────────────────────────────
  if (phase === "welcome") return (
    <Shell>
      <div style={{textAlign:"center"}}>
        <div style={{display:"flex",gap:7,justifyContent:"center",marginBottom:18}}>

        <p style={{fontSize:9,color:T.textLow,marginTop:22,letterSpacing:"0.2em"}}>163 SKUs {"\u00B7"} 43 BRANDS</p>

  // ── GOAL ──────────────────────────────────────────────────────────────────
  if (phase === "goal") return (
    <Shell>

      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:400,textAlign:"center",marginBottom:6}}>What brings you in today?</h2>
      <p style={{fontSize:13,color:T.textMid,textAlign:"center",marginBottom:28}}>Select your primary goal {"\u2014"} all categories appear in results</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:32}}>
        {[{key:"skincare",icon:"\u25C8",title:"Skincare",sub:"Skin quality scan + full routine by step"},

              <div style={{flex:1}}>

              {goal === opt.key && <div style={{width:20,height:20,borderRadius:"50%",background:"linear-gradient(135deg," + T.gold + "," + T.goldHi + ")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#1A1208",fontWeight:700}}>{"\u2713"}</div>}

  // ── ASSESS ────────────────────────────────────────────────────────────────
  if (phase === "assess") {

          <GoldBtn ghost onClick={function(){setPhase("goal");}}>{"← Back"}</GoldBtn>
          <GoldBtn onClick={runScan} style={{flex:1}}>{"Run Scan →"}</GoldBtn>

  // ── SCAN ──────────────────────────────────────────────────────────────────
  if (phase === "scan") {
    var stages = ["Initialising spectral sensor...","Reading skin depth index...","Mapping undertone profile...","Analysing skin quality metrics...","Building your routine...","Analysis complete"];
    return (
      <Shell>

        <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>

              <div style={{position:"absolute",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#D4AF6E,#F0D090,#D4AF6E,transparent)",boxShadow:"0 0 20px 4px rgba(212,175,110,0.6)",animation:"sb 1.8s ease-in-out infinite"}}/>
            </div>
            {[1,2].map(function(i) { return <div key={i} style={{position:"absolute",inset:-(i*14),borderRadius:"50%",border:"1px solid rgba(212,175,110," + (0.3/i) + ")",animation:"sp 2s ease-out " + (i*0.4) + "s infinite"}}/>; })}
          </div>
          <div style={{marginBottom:20}}>
            <div style={{height:2,background:"rgba(255,255,255,0.06)",borderRadius:1,overflow:"hidden",marginBottom:9}}>

                </div>

          </Card>
        </div>
      </Shell>
    );

  // ── APP DOWNLOAD SCREEN ───────────────────────────────────────────────────
  if (phase === "appDownload") return (
    <Shell>
      <div style={{textAlign:"center",maxWidth:400}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg," + T.gold + "," + T.goldHi + ")",margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{"\uD83D\uDCF1"}</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:400,marginBottom:8}}>Take your results with you</h2>

        <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid " + T.border,borderRadius:16,padding:"24px",marginBottom:28}}>

            <span style={{fontSize:9,padding:"3px 10px",borderRadius:10,background:"rgba(255,255,255,0.06)",color:T.textLow}}>Google Play</span>

        <Card style={{padding:"18px 20px",marginBottom:24,textAlign:"left"}}>
          <p style={{fontSize:10,letterSpacing:"0.2em",color:T.textLow,textTransform:"uppercase",marginBottom:12}}>In the NOOR app</p>
          {[
            ["\uD83D\uDCCA","Your full skin report saved","Metrics, skin type, undertone"],
            ["\uD83D\uDEC1","Complete personalised routine","Morning, evening & weekly steps"],
            ["\uD83D\uDECD","Product wishlist & price alerts","AED prices available"],
            ["\uD83D\uDCC8","Skin progress tracking","Rescan every 4 weeks"],
            ["\uD83C\uDF81","Exclusive beauty offers","Industry partner integration"],
          ].map(function(item) {
            return (
              <div key={item[1]} style={{display:"flex",gap:10,marginBottom:10}}>
                <span style={{fontSize:16,flexShrink:0}}>{item[0]}</span>
                <div>
                  <p style={{fontSize:12,fontWeight:500,color:T.text,marginBottom:1}}>{item[1]}</p>
                  <p style={{fontSize:10,color:T.textLow}}>{item[2]}</p>

          })}

        <p style={{fontSize:11,color:T.textMid,marginBottom:10}}>Or send results to your email</p>
        <div style={{display:"flex",gap:8,marginBottom:28}}>
          <input value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="your@email.com" style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid " + T.border,borderRadius:8,padding:"10px 14px",fontSize:12,color:T.text,fontFamily:"'DM Sans',sans-serif"}}/>
          <GoldBtn onClick={function(){setEmailSent(true);}} style={{padding:"10px 18px",fontSize:10}}>{emailSent ? "Sent \u2713" : "Send"}</GoldBtn>
        </div>

        <div style={{display:"flex",gap:10}}>
          <GoldBtn ghost onClick={function(){setPhase("results");}} style={{flex:1}}>{"← Back to Results"}</GoldBtn>
          <GoldBtn onClick={function(){setPhase("welcome");setFilters({halal:false,vegan:false,crueltyFree:false});}} style={{flex:1}}>New Scan</GoldBtn>
        </div>
        <p style={{fontSize:9,color:T.textLow,marginTop:18,letterSpacing:"0.15em"}}>NOOR AI {"\u00B7"} YOUR DATA IS PRIVATE & NEVER SHARED</p>
      </div>
    </Shell>
  );

  // ── RESULTS ───────────────────────────────────────────────────────────────
  var currentRoutineSteps = routineSection === "morning" ? routine.morning : routineSection === "evening" ? routine.evening : routine.weekly;

  return (
    <Shell center={false} maxW={600}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={function(){setPhase("assess");}} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",cursor:"pointer",color:T.textMid,fontFamily:"'DM Sans',sans-serif",fontSize:12,padding:"6px 0"}}>
          <span style={{fontSize:16}}>{"←"}</span> Back
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:skinHex,boxShadow:"0 4px 16px " + skinHex + "60,0 0 0 2px rgba(212,175,110,0.2)"}}/>

      </div>

      {/* Section title */}
      <p style={{fontSize:10,letterSpacing:"0.3em",color:T.textLow,textTransform:"uppercase",marginBottom:14}}>
        {activeTab === "overview" ? "Skin Overview" : activeTab === "routine" ? "Full Routine" : "Foundation Matching"}
      </p>

      {/* Filters */}
      <div style={{display:"flex",gap:7,marginBottom:16,flexWrap:"wrap"}}>
        <FilterPill label={"\u2726 Halal Only"} active={filters.halal} onClick={function(){toggleFilter("halal");}} colour="halal"/>
        <FilterPill label="Vegan" active={filters.vegan} onClick={function(){toggleFilter("vegan");}} colour="vegan"/>
        <FilterPill label="Cruelty-Free" active={filters.crueltyFree} onClick={function(){toggleFilter("crueltyFree");}} colour="crueltyFree"/>
      </div>

      {/* ── SKIN OVERVIEW ────────────────────────────────────────────────────── */}
      {activeTab === "overview" && (
        <div>

              <MetricGauge label="Hydration" value={skinMetrics.hydration} colour="#7AAED4" icon={"\uD83D\uDCA7"}/>
              <MetricGauge label="Oiliness" value={skinMetrics.oiliness} colour="#D4B84C" icon={"\u2726"}/>
              <MetricGauge label="Sensitivity" value={skinMetrics.sensitivity} colour="#D47A9E" icon={"\u25CB"}/>
              <MetricGauge label="Pigmentation" value={skinMetrics.pigmentation} colour="#D4A04C" icon={"\u25C8"}/>
              <MetricGauge label="Pore Size" value={skinMetrics.pores} colour="#9A7AD4" icon={"\u25C7"}/>
              <MetricGauge label="Firmness" value={skinMetrics.firmness} colour="#6BBF8A" icon={"\u2191"}/>
            </div>
          </Card>

          <Card style={{padding:"16px 18px",marginBottom:14,background:"rgba(200,168,76,0.05)"}}>
            <p style={{fontSize:10,letterSpacing:"0.2em",color:T.gold,marginBottom:8}}>NOOR INSIGHT</p>
            <p style={{fontSize:13,color:T.textMid,lineHeight:1.7}}>
              {skinMetrics.oiliness > 65 && skinMetrics.sensitivity > 50
                ? "Your skin is oily-sensitive \u2014 avoid heavy oils and alcohol-based products. Look for non-comedogenic, fragrance-free formulas."
                : skinMetrics.hydration < 40 && skinMetrics.oiliness < 40
                ? "Dry skin needs barrier support \u2014 layer a hydrating serum under a rich cream, and never skip SPF."
                : skinMetrics.pigmentation > 60
                ? "Elevated pigmentation index. Niacinamide, Vitamin C, and SPF 50+ daily will deliver the most visible improvement."
                : "Your skin metrics are well-balanced. Focus on maintaining your barrier and protecting with broad-spectrum SPF daily."}
            </p>
          </Card>

          <GoldBtn onClick={function(){setActiveTab("routine");}} style={{width:"100%"}}>
            {"View Your Full Routine →"}
          </GoldBtn>
        </div>
      )}

      {/* ── FULL ROUTINE ─────────────────────────────────────────────────── */}
      {activeTab === "routine" && (
        <div>
          <Card style={{padding:"14px 18px",marginBottom:14,background:"rgba(200,168,76,0.04)"}}>
            <p style={{fontSize:10,letterSpacing:"0.2em",color:T.gold,marginBottom:4}}>YOUR PERSONALISED ROUTINE</p>
            <p style={{fontSize:12,color:T.textMid,lineHeight:1.6}}>
              Optimised for <strong style={{color:T.text}}>{skinTypes[0]}</strong> skin
              {activeConcerns.length > 0 && <span> targeting <strong style={{color:T.text}}>{activeConcerns.slice(0,3).join(", ")}</strong></span>}.
              Tap any product to expand.
            </p>
          </Card>

          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {[["morning","\u2600 Morning"],["evening","\uD83C\uDF19 Evening"],["weekly","\u25C7 Weekly"]].map(function(item) {
              var k = item[0], l = item[1];
              return (
                <button key={k} onClick={function(){setRoutineSection(k);}} style={{flex:1,padding:"9px 4px",borderRadius:10,fontSize:11,fontWeight:500,cursor:"pointer",transition:"all 0.2s",background:routineSection===k?"rgba(200,168,76,0.15)":"rgba(255,255,255,0.03)",border:"1px solid " + (routineSection===k?T.borderHi:T.border),color:routineSection===k?T.goldHi:T.textMid,fontFamily:"'DM Sans',sans-serif"}}>{l}</button>
              );
            })}
          </div>

          {currentRoutineSteps.map(function(s, i) {
            return <RoutineStep key={i} step={s.step} icon={s.icon} note={s.note} products={s.products} filters={filters}/>;
          })}
        </div>
      )}

      {/* ── FOUNDATION ───────────────────────────────────────────────────── */}
      {activeTab === "foundation" && (
        <div>
          {filters.halal && (
            <Card style={{padding:"14px 18px",marginBottom:12,background:"rgba(180,140,60,0.07)",borderColor:"rgba(212,175,110,0.3)"}}>
              <p style={{fontSize:10,letterSpacing:"0.15em",color:T.gold,marginBottom:4}}>MARKET INSIGHT</p>
              <p style={{fontSize:12,color:"#D8C8A8",lineHeight:1.6}}><strong style={{color:T.goldHi}}>Limited prestige options</strong> with halal certification in beauty. GCC market: <strong style={{color:T.goldHi}}>USD 1.2B by 2026</strong>. Emerging brands prioritising certification {"\u2014"} check product pages for latest status.</p>
            </Card>
          )}
          <Card style={{padding:"14px 18px",marginBottom:12,background:"rgba(200,168,76,0.04)"}}>
            <p style={{fontSize:10,letterSpacing:"0.2em",color:T.gold,marginBottom:4}}>SMART MATCHING</p>
            <p style={{fontSize:12,color:T.textMid,lineHeight:1.6}}>
              Ranked by <strong style={{color:T.text}}>70% shade accuracy + 30% skin compatibility</strong> for your <strong style={{color:T.text}}>{skinTypes[0]}</strong> skin profile.
              {skinMetrics.oiliness > 55 ? " Mattifying finishes prioritised." : skinMetrics.hydration < 45 ? " Hydrating finishes prioritised." : ""}
            </p>
          </Card>
          <p style={{fontSize:10,letterSpacing:"0.2em",color:T.textLow,marginBottom:12,textTransform:"uppercase"}}>{foundationMatches.length} matches {"\u00B7"} {depthLabel(skinPos)} {"\u00B7"} {undertoneLabel(skinPos)}</p>
          {foundationMatches.length === 0
            ? <Card style={{padding:"28px",textAlign:"center"}}><p style={{color:T.textMid}}>No matches with selected filters.</p></Card>
            : foundationMatches.map(function(p) { return <ProductCard key={p.id} p={p} filters={filters} foundationHex={p.hex}/>; })
          }
        </div>
      )}

      {/* ── BOTTOM NAV ──────────────────────────────────────────────────── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"100vw",background:"rgba(10,9,7,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid " + T.border,zIndex:100}}>
        <div style={{display:"flex",maxWidth:600,margin:"0 auto"}}>
          {[{key:"overview",icon:"\u25C8",label:"Skin"},{key:"routine",icon:"\u2600",label:"Routine"},{key:"foundation",icon:"\u25CB",label:"Foundation"},{key:"__app",icon:"\uD83D\uDCF1",label:"Save"}]
          .map(function(t) {
            return (
              <button key={t.key} onClick={function(){if(t.key==="__app")setPhase("appDownload");else setActiveTab(t.key);}}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"12px 4px 10px",background:"transparent",border:"none",cursor:"pointer",transition:"all 0.2s",borderTop:"2px solid " + (activeTab===t.key && t.key!=="__app" ? T.gold : "transparent")}}>
                <span style={{fontSize:16,lineHeight:1}}>{t.icon}</span>
                <span style={{fontSize:9,letterSpacing:"0.08em",color:activeTab===t.key && t.key!=="__app" ? T.gold : T.textMid,fontWeight:activeTab===t.key && t.key!=="__app" ? 600 : 400,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </Shell>
  );
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(NoorApp));
  </script>
</body>
</html>
